# H2 in-memory database — replaces PostgreSQL for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Test JWT secret (Base64-encoded 256-bit key — not used in production)
app.jwt.secret=c2VjcmV0LWtleS1mb3ItdGVzdGluZy1vbmx5LW5vdC1mb3ItcHJvZHVjdGlvbg==
app.jwt.expiration=86400000

# Disable email notifications for tests
app.notifications.enabled=false
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=
spring.mail.password=
