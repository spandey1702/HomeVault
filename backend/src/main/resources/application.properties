# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── JWT ───────────────────────────────────────────────────────────────────────
# Secret must be Base64-encoded and at least 32 bytes (256 bits) for HS256.
# Generate with: openssl rand -base64 64
app.jwt.secret=${SESSION_SECRET}
app.jwt.expiration=86400000

# ── Email notifications ────────────────────────────────────────────────────────
app.notifications.enabled=${NOTIFICATIONS_ENABLED:false}
app.notifications.from=${NOTIFICATIONS_FROM:noreply@homevault.app}

# AWS SES SMTP settings (set these in environment / Secrets Manager for production)
spring.mail.host=${SMTP_HOST:email-smtp.us-east-1.amazonaws.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── File upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
